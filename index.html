<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shift Booking System</title>

<style>
body{
  font-family:'Segoe UI',Tahoma;
  background:linear-gradient(135deg,#eef5fb,#dfeaf5);
  text-align:center;
  margin:0;
}

header{
  background:#0a4fa3;
  color:#fff;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.box{
  background:#fff;
  padding:15px;
  margin:15px auto;
  border-radius:12px;
  max-width:400px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  max-width:800px;
  margin:auto;
}

.dayHeader{
  background:#d9e6f7;
  padding:8px;
  font-weight:bold;
}

.day{
  background:#fff;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.day.disabled{background:#eee;color:#999;}
.day.today{border:2px solid #0a4fa3;}
.day.weekend{background:#f8d7da;}
.day.active{background:#0a4fa3;color:#fff;}

.shift{margin:10px;padding:10px;border-radius:8px;}
.ok{background:#28a745;color:#fff;}
.full{background:#dc3545;color:#fff;}

button{
  padding:6px 10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:#0a4fa3;
  color:#fff;
}

.counter{
  display:flex;
  justify-content:center;
  gap:10px;
}
</style>
</head>

<body>

<header>Shift Booking – Next Month</header>

<div class="box">

<input id="name" placeholder="Name"><br><br>

<input id="emp" placeholder="Employee ID"><br><br>

<select id="reason">
  <option value="">Select Reason</option>
  <option value="NORMAL">Normal</option>
  <option value="SAL">SAL</option>
</select>

<br><br>

<button onclick="cancelBooking()">Cancel My Booking</button>

<div id="myBooking"></div>

</div>

<div class="counter" id="counter"></div>

<h3 id="monthTitle"></h3>

<div id="calendar" class="calendar"></div>

<div id="shifts"></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzOliheqTjIuLMPwTotMgBm-pj198Bhklq5WAes_e5G88FuKDRH35_jnvCqyMn-MTTp5A/exec";

const MAX=5;
const SHIFTS=["M","A","N","O"];

let data=[];
let selectedDate=null;
let myBooking=null;

function updateCounter(){

  let div=document.getElementById("counter");

  div.innerHTML="";

  let nextMonth = getNextMonth();

  let month =
    String(nextMonth.getMonth()+1).padStart(2,'0');

  let year = nextMonth.getFullYear();

  SHIFTS.forEach(s=>{

    let c=data.filter(x=>{

      let bookingDate = new Date(x.date);

      let bookingMonth =
        String(bookingDate.getMonth()+1).padStart(2,'0');

      let bookingYear =
        bookingDate.getFullYear();

      return (
        x.shift==s &&
        bookingMonth==month &&
        bookingYear==year
      );

    }).length;

    div.innerHTML +=
      `<div>${s}: ${c}/${MAX}</div>`;

  });

}

function getNextMonth(){

  let now=new Date();

  return new Date(
    now.getFullYear(),
    now.getMonth()+1,
    1
  );
}

function buildCalendar(){

  let cal=document.getElementById("calendar");

  cal.innerHTML="";

  let first=getNextMonth();

  let last=new Date(
    first.getFullYear(),
    first.getMonth()+1,
    0
  );

  document.getElementById("monthTitle").innerText=
    first.toLocaleString(
      "en",
      {month:"long",year:"numeric"}
    );

  const headers=[
    "Sun","Mon","Tue",
    "Wed","Thu","Fri","Sat"
  ];

  headers.forEach(h=>{
    cal.innerHTML+=
      `<div class="dayHeader">${h}</div>`;
  });

  for(let i=0;i<first.getDay();i++){
    cal.innerHTML+="<div></div>";
  }

  // السماح بالحجز فقط من 12 الى 14
  let today=new Date();

  let currentDay=today.getDate();

  let bookingOpen =
    currentDay>=12 && currentDay<=14;

  for(let d=1; d<=last.getDate(); d++){

    let date=new Date(
      first.getFullYear(),
      first.getMonth(),
      d
    );

    let iso=date.toISOString().split("T")[0];

    let div=document.createElement("div");

    div.className="day";

    div.innerText=d;

    if(!bookingOpen){

      div.classList.add("disabled");

    }else{

      div.onclick=()=>{

        selectedDate=iso;

        document
        .querySelectorAll(".day")
        .forEach(x=>x.classList.remove("active"));

        div.classList.add("active");

        renderShifts();
      }
    }

    cal.appendChild(div);
  }

  // رسالة اغلاق الحجز
  if(!bookingOpen){

    document.getElementById("shifts").innerHTML=
      "<h3>Booking allowed only from day 12 to 14 of current month</h3>";
  }
}

function checkMyBooking(emp){

  let nextMonth = getNextMonth();

  let month =
    String(nextMonth.getMonth()+1).padStart(2,'0');

  let year = nextMonth.getFullYear();

  myBooking = data.filter(x=>{

    let bookingDate = new Date(x.date);

    let bookingMonth =
      String(bookingDate.getMonth()+1).padStart(2,'0');

    let bookingYear =
      bookingDate.getFullYear();

    return (
      x.emp==emp &&
      bookingMonth==month &&
      bookingYear==year
    );

  });

}
function renderShifts(){

  let div=document.getElementById("shifts");

  let emp=document.getElementById("emp").value;

  let reason=document.getElementById("reason").value;

  if(!emp){
    div.innerHTML="<h3>Enter Employee ID first</h3>";
    return;
  }

  if(!reason){
    div.innerHTML="<h3>Select Reason First</h3>";
    return;
  }

  checkMyBooking(emp);

  let hasSAL = myBooking.some(x=>x.reason=="SAL");

let limit = hasSAL || reason=="SAL" ? 3 : 1;

  if(myBooking.length >= limit){

    document.getElementById("myBooking").innerHTML =
      "You already booked "+myBooking.length+" day(s)";

    div.innerHTML="<h3>Booking limit reached</h3>";

    return;

  }else{

    document.getElementById("myBooking").innerHTML =
      "Booked Days: "+myBooking.length+" / "+limit;
  }

  div.innerHTML="<h3>Select Shift</h3>";

  SHIFTS.forEach(s=>{

   let c=data.filter(x=>{

  let bookingDate = new Date(x.date);

  let bookingMonth =
    bookingDate.getMonth();

  let bookingYear =
    bookingDate.getFullYear();

  let selected = new Date(selectedDate);

  return (
    x.shift==s &&
    bookingMonth==selected.getMonth() &&
    bookingYear==selected.getFullYear() &&
    x.date==selectedDate
  );

}).length;
    let el=document.createElement("div");

    el.className="shift "+(c>=MAX?"full":"ok");

    if(c>=MAX){

      el.innerText=`${s} FULL`;

    }else{

      el.innerHTML=`${s} (${MAX-c} left)<br>
      <button onclick="book('${s}')">Book</button>`;
    }

    div.appendChild(el);
  });
}
function book(shift){

  let name=document.getElementById("name").value;

  let emp=document.getElementById("emp").value;

  let reason=document.getElementById("reason").value;

  if(!name || !emp || !reason){

    alert("Enter all data");

    return;
  }

  let sameDate = data.find(x=>
    x.emp==emp &&
    x.date==selectedDate
  );

  if(sameDate){

    alert("You already booked this date");

    return;
  }

  let params=new URLSearchParams();

  params.append("name",name);

  params.append("emp",emp);

  params.append("date",selectedDate);

  params.append("shift",shift);

  params.append("reason",reason);

  fetch(SCRIPT_URL,{
    method:"POST",
    body:params
  })

  .then(r=>r.text())

  .then(t=>{

    alert(t);

    fetch(SCRIPT_URL)

    .then(r=>r.json())

    .then(d=>{

      data=d;

      updateCounter();

      renderShifts();

    });

  });

}

function cancelBooking(){
  let emp=document.getElementById("emp").value;

  if(!emp){
    alert("Enter Employee ID");
    return;
  }

  fetch(SCRIPT_URL+"?action=delete&emp="+emp)
  .then(r=>r.text())
  .then(t=>{
    alert(t);

    fetch(SCRIPT_URL)
    .then(r=>r.json())
    .then(d=>{
      data=d;
      updateCounter();
      renderShifts();
    });
  });
}

fetch(SCRIPT_URL)
.then(r=>r.json())
.then(d=>{
  data=d;
  buildCalendar();
  updateCounter();
});
</script>

</body>
</html>
