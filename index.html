<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shift Booking System</title>

<style>
body{
  font-family:'Segoe UI',Tahoma;
  background:linear-gradient(135deg,#eef5fb,#dfeaf5);
  text-align:center;
  margin:0;
}

header{
  background:#0a4fa3;
  color:#fff;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.box{
  background:#fff;
  padding:15px;
  margin:15px auto;
  border-radius:12px;
  max-width:400px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  max-width:800px;
  margin:auto;
}

.dayHeader{
  background:#d9e6f7;
  padding:8px;
  font-weight:bold;
}

.day{
  background:#fff;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.25s;
  border:2px solid transparent;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.day:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(10,79,163,0.25);
  border-color:#0a4fa3;
}

.day.active{
  background:#0a4fa3;
  color:#fff;
  border-color:#0a4fa3;
  box-shadow:0 6px 16px rgba(10,79,163,0.35);
}

.day.booked{
  background:#0a4fa3;
  color:#fff;
  border-color:#0a4fa3;
  box-shadow:0 6px 16px rgba(10,79,163,0.35);
}

.day.disabled{background:#eee;color:#999;}
.day.today{border:2px solid #0a4fa3;}
.day.weekend{background:#f8d7da;}
.day.active{background:#0a4fa3;color:#fff;}

.shift{margin:10px;padding:10px;border-radius:8px;}
.ok{background:#28a745;color:#fff;}
.full{background:#dc3545;color:#fff;}

button{
  padding:6px 10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:#0a4fa3;
  color:#fff;
}

.counter{
  display:flex;
  justify-content:center;
  gap:10px;
}
</style>
</head>

<body>

<header>Shift Booking – Next Month</header>

<div class="box">

<input id="name" placeholder="Name"><br><br>

<input id="emp" placeholder="Employee ID"><br><br>




<br><br>

<button onclick="cancelBooking()">Cancel My Booking</button>

<div id="myBooking"></div>

</div>

<div class="counter" id="counter"></div>

<h3 id="monthTitle"></h3>

<div id="calendar" class="calendar"></div>

<div id="shifts"></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzOliheqTjIuLMPwTotMgBm-pj198Bhklq5WAes_e5G88FuKDRH35_jnvCqyMn-MTTp5A/exec";

const MAX=5;
const SHIFTS=["M","A","N","O"];

let data=[];
let selectedDate=null;
let myBooking=null;
  let offDates=[];
let offMode=false;

  
 
function updateCounter(){

  let div=document.getElementById("counter");

  div.innerHTML="";

  let nextMonth = getNextMonth();

  let month =
    String(nextMonth.getMonth()+1).padStart(2,'0');

  let year = nextMonth.getFullYear();

  SHIFTS.forEach(s=>{

    let c=data.filter(x=>{

  // SAL لا يدخل ضمن الحد
 

      let bookingDate = new Date(x.date);

      let bookingMonth =
        String(bookingDate.getMonth()+1).padStart(2,'0');

      let bookingYear =
        bookingDate.getFullYear();

      return (
  x.shift==s &&
  x.reason!="OFF" &&
  bookingMonth==month &&
  bookingYear==year
);

    }).length;

    div.innerHTML +=
      `<div>${s}: ${c}/${MAX}</div>`;

  });

}

function getNextMonth(){

  let now=new Date();

  return new Date(
    now.getFullYear(),
    now.getMonth()+1,
    1
  );
}

function buildCalendar(){

  let cal=document.getElementById("calendar");

  cal.innerHTML="";

  let first=getNextMonth();

  let last=new Date(
    first.getFullYear(),
    first.getMonth()+1,
    0
  );

  document.getElementById("monthTitle").innerText=
    first.toLocaleString(
      "en",
      {month:"long",year:"numeric"}
    );

  const headers=[
    "Sun","Mon","Tue",
    "Wed","Thu","Fri","Sat"
  ];

  headers.forEach(h=>{
    cal.innerHTML +=
      `<div class="dayHeader">${h}</div>`;
  });

  for(let i=0;i<first.getDay();i++){

    cal.innerHTML += "<div></div>";
  }

  let today=new Date();

  let currentDay=today.getDate();

  let bookingOpen =
    currentDay >= 17 &&
    currentDay <= 19;

  for(let d=1; d<=last.getDate(); d++){

    let date=new Date(
      first.getFullYear(),
      first.getMonth(),
      d
    );

    let iso=date.toISOString().split("T")[0];

    let div=document.createElement("div");

    div.className="day";

    div.innerText=d;
// تثبيت الأيام المحجوزة للموظف
let emp=document.getElementById("emp").value;

if(emp){

  let booked=data.find(x=>
    x.emp==emp &&
    x.date==iso
  );

 if(booked){

  div.classList.add("booked");

  // منع الضغط على الأيام المحجوزة
 if(booked.reason!="OFF"){
  div.style.pointerEvents="none";
}
}
}
    // شكل الأيام المغلقة
    if(!bookingOpen){

      div.classList.add("disabled");

      div.style.opacity="0.6";

    }else{

      div.style.background="#ffffff";

      div.style.color="#000";

      div.onclick=()=>{

  // إذا مختار OFF
  if(offMode){

    if(offDates.includes(iso)){

      offDates =
        offDates.filter(x=>x!=iso);

      div.classList.remove("active");

    }else{

      if(offDates.length>=3){

        alert("Maximum 3 OFF days");

        return;
      }

      offDates.push(iso);

      div.classList.add("active");
      
      offMode=true;
    }

  }else{

    selectedDate=iso;

    document
    .querySelectorAll(".day")
    .forEach(x=>x.classList.remove("active"));

    div.classList.add("active");
  }

  renderShifts();
};
    }

    cal.appendChild(div);
  }

  if(!bookingOpen){

    document.getElementById("shifts").innerHTML =
      "<h3>Booking opens from day 12 to 14 only</h3>";
  }
}
function checkMyBooking(emp){

  let nextMonth = getNextMonth();

  let month =
    String(nextMonth.getMonth()+1).padStart(2,'0');

  let year = nextMonth.getFullYear();

  myBooking = data.filter(x=>{

    let bookingDate = new Date(x.date);

    let bookingMonth =
      String(bookingDate.getMonth()+1).padStart(2,'0');

    let bookingYear =
      bookingDate.getFullYear();

    return (
      x.emp==emp &&
      bookingMonth==month &&
      bookingYear==year
    );

  });

}
function renderShifts(){

  let div=document.getElementById("shifts");

  let emp=document.getElementById("emp").value;

  

  if(!emp){

    div.innerHTML =
      "<h3>Enter Employee ID first</h3>";

    return;
  }

  checkMyBooking(emp);

  // فصل الحجوزات
  let normalBookings =
    myBooking.filter(x=>
      x.reason!="OFF"
    ).length;

  let salBookings =
  myBooking.filter(x=>
    x.reason=="OFF"
  ).length;

  // عرض العدادات
document.getElementById(
  "myBooking"
).innerHTML = `
Normal: ${normalBookings}/1
<br>
OFF Days: ${salBookings}/3
`;

  // NORMAL فقط
 if(
  normalBookings>=1 &&
  !offMode
)
{

  div.innerHTML =
    "<h3>Normal booking already used</h3>";

  return;
}
 

  div.innerHTML =
    "<h3>Select Shift</h3>";

  SHIFTS.forEach(s=>{

    let c=data.filter(x=>{

      let bookingDate =
        new Date(x.date);

      let bookingMonth =
        bookingDate.getMonth();

      let bookingYear =
        bookingDate.getFullYear();

      let selected =
        new Date(selectedDate);

      return (

        x.shift==s &&

        x.reason!="OFF" &&

        bookingMonth==
        selected.getMonth() &&

        bookingYear==
        selected.getFullYear() &&

        x.date==selectedDate

      );

    }).length;

    let el=document.createElement("div");

    el.className =
      "shift "+(c>=MAX?"full":"ok");

    if(c>=MAX){

      el.innerText=`${s} FULL`;

    }else{

      el.innerHTML=
      `${s} (${MAX-c} left)<br>
      <button onclick="book('${s}')">
      Book
      </button>`;
    }

    div.appendChild(el);

  });

}
function book(shift){

if(shift=="O"){

  offMode=true;

}else{

  offMode=false;
}
  // حد OFF = 3 أيام فقط
let offBookings =
  myBooking.filter(x=>
    x.reason=="OFF"
  ).length;

if(
  shift=="O" &&
  (offBookings + offDates.length) > 3
){

  alert("Maximum 3 OFF days only");

  return;
}
  let name=document.getElementById("name").value;

  let emp=document.getElementById("emp").value;

  if(!name || !emp){

    alert("Enter all data");

    return;
  }

  // OFF متعدد الأيام
  if(shift=="O"){

    if(offDates.length==0){

      alert("Select OFF dates");

      return;
    }



   Promise.all(

  offDates.map(d=>{

    let params=new URLSearchParams();

    params.append("name",name);

    params.append("emp",emp);

    params.append("date",d);

    params.append("shift","O");

    params.append("reason","OFF");

    return fetch(SCRIPT_URL,{
      method:"POST",
      body:params
    });

  })

).then(()=>{

  alert("OFF booking submitted");

  fetch(SCRIPT_URL)
  .then(r=>r.json())
.then(d=>{

  // تنظيف الأيام المختارة أولاً
  offDates=[];

  offMode=false;

  data=d;

  buildCalendar();

  checkMyBooking(emp);

  updateCounter();

  renderShifts();

});


  });

});

   
    return;
  }

  // الحجوزات العادية
  let sameDate = data.find(x=>
    x.emp==emp &&
    x.date==selectedDate
  );

  if(sameDate){

    alert("You already booked this date");

    return;
  }

  let params=new URLSearchParams();

  params.append("name",name);

  params.append("emp",emp);

  params.append("date",selectedDate);

  params.append("shift",shift);

  params.append("reason","NORMAL");

  fetch(SCRIPT_URL,{
    method:"POST",
    body:params
  })

  .then(r=>r.text())

  .then(t=>{

    alert(t);

    fetch(SCRIPT_URL)

    .then(r=>r.json())

    .then(d=>{

     data=d;

buildCalendar();

updateCounter();

renderShifts();
    });

  });

}

function cancelBooking(){
  let emp=document.getElementById("emp").value;

  if(!emp){
    alert("Enter Employee ID");
    return;
  }

  fetch(SCRIPT_URL+"?action=delete&emp="+emp)
  .then(r=>r.text())
  .then(t=>{
    alert(t);

    fetch(SCRIPT_URL)
    .then(r=>r.json())
    .then(d=>{
      data=d;
      updateCounter();
      renderShifts();
    });
  });
}

fetch(SCRIPT_URL)
.then(r=>r.json())
.then(d=>{
  data=d;
  buildCalendar();
  updateCounter();
});
</script>

</body>
</html>
